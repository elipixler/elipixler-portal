<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPS — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f7f5f2;
      --surface:     #ffffff;
      --surface-2:   #f2ede8;
      --border:      #e0d8d0;
      --border-mid:  #ccc4b8;
      --text:        #1a1612;
      --text-mid:    #6b6055;
      --text-soft:   #a09488;
      --gold:        #b8924a;
      --gold-bg:     #faf0db;
      --gold-border: rgba(184,146,74,0.4);
      --red:         #b03a2e;
      --red-bg:      #fdf2f1;
      --green:       #1e6b45;
      --green-bg:    #eaf5ee;
    }

    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ──────────────── LOGIN ──────────────────────── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(160deg, #ffffff 0%, var(--bg) 100%);
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3rem 2.75rem 3.25rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06);
    }

    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .login-sub {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 2.25rem;
    }

    .login-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 0.8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      margin-bottom: 0.875rem;
      text-align: center;
      letter-spacing: 0.15em;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--border-mid); }

    .login-btn {
      width: 100%;
      background: var(--text);
      color: #fff;
      border: none;
      padding: 0.85rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--gold); }

    .login-error {
      color: var(--red);
      font-size: 0.72rem;
      margin-top: 0.75rem;
      letter-spacing: 0.04em;
      min-height: 1.2em;
    }

    /* ──────────────── LAYOUT ──────────────────────── */
    .admin-wrap { display: none; }
    .admin-wrap.visible { display: block; }

    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 0.875rem; }

    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .header-sep { width: 1px; height: 16px; background: var(--border); }
    .header-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .logout-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-soft);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.35rem 0;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--text); }

    .admin-body {
      max-width: 840px;
      margin: 0 auto;
      padding: 2.5rem 2rem 6rem;
    }

    /* ──────────────── SECTION TITLE ───────────────── */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    /* ──────────────── CARD ────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.75rem 2rem;
      margin-bottom: 3rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    /* ──────────────── FORM ────────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      margin-bottom: 0.875rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }

    .form-label {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 400;
    }

    .form-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 0.68rem 0.875rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-input:focus { border-color: var(--border-mid); }
    .form-input::placeholder { color: var(--text-soft); opacity: 0.55; font-style: italic; }

    .form-hint {
      font-size: 0.6rem;
      color: var(--text-soft);
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    .create-btn {
      background: var(--text);
      color: #fff;
      border: none;
      padding: 0.75rem 1.875rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .create-btn:hover { background: var(--gold); }
    .create-btn svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 1.75; stroke-linecap: round;
    }

    /* ──────────────── CLIENT LIST HEADER ──────────── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.875rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .list-label {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .list-count {
      font-size: 0.62rem;
      color: var(--text-soft);
    }

    /* ──────────────── CLIENT CARD ─────────────────── */
    .client-card {
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 0.625rem;
      overflow: hidden;
      transition: border-color 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .client-card.panel-open { border-color: var(--border-mid); }

    .client-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.1rem 1.5rem;
      flex-wrap: wrap;
    }

    .client-info h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      line-height: 1.3;
    }

    .client-info p {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--text-soft);
      margin-top: 0.2rem;
    }

    .vid-badge {
      font-family: 'Inter', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      background: var(--gold-bg);
      color: var(--gold);
      padding: 0.15rem 0.5rem;
      font-style: normal;
      font-weight: 400;
    }

    .client-actions {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.42rem 0.8rem;
      cursor: pointer;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      text-decoration: none;
      background: transparent;
      transition: all 0.18s ease;
      font-weight: 300;
      white-space: nowrap;
    }
    .btn svg {
      width: 10px; height: 10px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .btn-add {
      color: var(--gold);
      border-color: var(--gold-border);
      background: transparent;
    }
    .btn-add:hover, .btn-add.active { background: var(--gold-bg); border-color: var(--gold); }

    .btn-outline {
      color: var(--text-mid);
      border-color: var(--border);
    }
    .btn-outline:hover { border-color: var(--border-mid); color: var(--text); }

    .btn-copy {
      color: var(--text-mid);
      border-color: var(--border);
    }
    .btn-copy:hover { border-color: var(--border-mid); color: var(--text); }
    .btn-copy.copied { background: var(--green-bg); border-color: var(--green); color: var(--green); }

    .btn-del {
      color: var(--text-soft);
      border-color: transparent;
      padding: 0.42rem 0.5rem;
    }
    .btn-del:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }

    /* ──────────────── VIDEO PANEL ─────────────────── */
    .video-panel {
      display: none;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      padding: 1.5rem 1.5rem 1.75rem;
    }
    .video-panel.open { display: block; }

    .panel-title {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 1.1rem;
      font-weight: 400;
    }

    /* Add video row */
    .add-row {
      display: grid;
      grid-template-columns: 1.1fr 2fr auto;
      gap: 0.6rem;
      align-items: end;
      margin-bottom: 0.875rem;
    }

    .add-row .form-input {
      padding: 0.62rem 0.8rem;
      font-size: 0.82rem;
      background: var(--surface);
    }

    .add-btn {
      background: var(--text);
      color: #fff;
      border: none;
      padding: 0.62rem 1.1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .add-btn:hover { background: var(--gold); }
    .add-btn svg {
      width: 10px; height: 10px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round;
    }

    /* URL tip */
    .url-tip {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.65rem;
      line-height: 1.6;
      color: var(--text-soft);
    }
    .url-tip strong { color: var(--text-mid); font-weight: 400; }

    /* Upload */
    .upload-section {
      margin-bottom: 1rem;
      padding: 1.1rem 1.1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .upload-section-title {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 0.75rem;
      font-weight: 400;
    }
    .upload-label-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--text);
      color: #fff;
      padding: 0.62rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .upload-label-btn:hover { background: var(--gold); }
    .upload-label-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .upload-label-btn.uploading { background: var(--gold); pointer-events: none; }

    .upload-progress { margin-top: 0.875rem; display: none; }
    .upload-track { height: 2px; background: var(--border); width: 100%; margin-bottom: 0.4rem; border-radius: 2px; overflow: hidden; }
    .upload-fill { height: 2px; background: var(--gold); width: 0%; transition: width 0.25s ease; border-radius: 2px; }
    .upload-fill.complete { background: var(--green); }
    .upload-fill.error { background: var(--red); }
    .upload-status-text { font-size: 0.62rem; color: var(--text-soft); letter-spacing: 0.04em; }

    .panel-or {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 0.875rem 0 1rem;
    }
    .panel-or-line { flex: 1; height: 1px; background: var(--border); }
    .panel-or-text { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-soft); }

    /* Video list */
    .vid-list { display: flex; flex-direction: column; gap: 0.35rem; }

    .vid-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.65rem 0.875rem 0.65rem 0.75rem;
    }

    .vid-num {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      background: var(--surface-2);
      padding: 0.2rem 0.45rem;
      flex-shrink: 0;
      font-weight: 400;
    }

    .vid-info { flex: 1; min-width: 0; }
    .vid-title {
      font-size: 0.82rem;
      color: var(--text);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vid-url {
      font-size: 0.62rem;
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }

    .vid-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-soft);
      padding: 0.3rem;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .vid-remove:hover { color: var(--red); }
    .vid-remove svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

    .vid-empty {
      font-size: 0.75rem;
      color: var(--text-soft);
      font-style: italic;
      padding: 0.25rem 0;
    }

    /* ──────────────── EMPTY PORTALS ───────────────── */
    .empty-portals {
      text-align: center;
      padding: 3rem 2rem;
      background: var(--surface);
      border: 1px dashed var(--border-mid);
    }
    .empty-portals p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text-soft);
    }

    /* ──────────────── TOAST ────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--text);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.8rem 1.25rem;
      z-index: 300;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s ease;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ──────────────── RESPONSIVE ───────────────────── */
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .admin-header { padding: 1rem 1.25rem; }
      .admin-body { padding: 1.75rem 1rem 4rem; }
      .client-row { flex-direction: column; align-items: flex-start; }
      .add-row { grid-template-columns: 1fr; }
      .add-btn { width: 100%; justify-content: center; }
      .card { padding: 1.25rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Eli Pixler Studios</div>
    <p class="login-sub">Admin Portal</p>
    <input class="login-input" type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" id="loginBtn">Enter</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div class="admin-wrap" id="adminWrap">

  <header class="admin-header">
    <div class="header-left">
      <div class="header-logo">Eli Pixler Studios</div>
      <div class="header-sep"></div>
      <span class="header-label">Admin</span>
    </div>
    <button class="logout-btn" id="logoutBtn">Sign out</button>
  </header>

  <div class="admin-body">

    <!-- CREATE PORTAL -->
    <p class="section-title">Create New Client Portal</p>
    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Bride's Name *</label>
          <input class="form-input" type="text" id="clientName" placeholder="Sarah Johnson" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Partner's Name (optional)</label>
          <input class="form-input" type="text" id="clientPartner" placeholder="James Williams" autocomplete="off" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Wedding Date</label>
          <input class="form-input" type="text" id="clientDate" placeholder="June 14, 2025" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">URL Slug *</label>
          <input class="form-input" type="text" id="clientSlug" placeholder="sarah-johnson" autocomplete="off" />
          <span class="form-hint">Auto-filled — edit if needed</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="form-label">Cover Photo URL (optional)</label>
          <input class="form-input" type="url" id="clientCover" placeholder="https://www.dropbox.com/s/... or any direct image link" autocomplete="off" />
          <span class="form-hint">Paste a Dropbox/Google Drive/direct link to a photo — shown as the hero background on their portal</span>
        </div>
      </div>
      <button class="create-btn" id="createClientBtn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Portal
      </button>
    </div>

    <!-- CLIENT LIST -->
    <div class="list-header">
      <span class="list-label">Your Client Portals</span>
      <span class="list-count" id="listCount"></span>
    </div>
    <div id="clientList"></div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── SUPABASE CONFIG ───────────────────────────────────
  const SUPABASE_URL    = 'https://agrymwvcdnheccromupd.supabase.co';
  const SUPABASE_KEY    = 'sb_publishable_otI76Wja5LMZdVf6ixO-rA_xpFylkVp';
  const STORAGE_BUCKET  = 'videos';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  // ──────────────────────────────────────────────────────

  // ─── CHANGE THIS PASSWORD ──────────────────────────────
  const ADMIN_PASSWORD = '2003';
  // ──────────────────────────────────────────────────────

  // ── Auth ─────────────────────────────────────────────
  const loginBtn  = document.getElementById('loginBtn');
  const pwInput   = document.getElementById('passwordInput');
  const loginErr  = document.getElementById('loginError');

  loginBtn.addEventListener('click', tryLogin);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  async function tryLogin() {
    if (pwInput.value === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminWrap').classList.add('visible');
      await renderClients();
    } else {
      loginErr.textContent = 'Incorrect password.';
      pwInput.select();
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    document.getElementById('adminWrap').classList.remove('visible');
    document.getElementById('loginScreen').style.display = 'flex';
    pwInput.value = '';
    loginErr.textContent = '';
  });

  // ── Auto-slug ─────────────────────────────────────────
  document.getElementById('clientName').addEventListener('input', () => {
    const v = document.getElementById('clientName').value;
    document.getElementById('clientSlug').value =
      v.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  });

  // ── Supabase DB helpers ────────────────────────────────
  async function getClients() {
    const { data, error } = await sb.from('clients').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); toast('Error loading portals'); return []; }
    return data || [];
  }

  async function updateVideos(slug, videos) {
    const { error } = await sb.from('clients').update({ videos }).eq('slug', slug);
    if (error) throw error;
  }

  async function deleteClientDB(slug) {
    const { error } = await sb.from('clients').delete().eq('slug', slug);
    if (error) throw error;
  }

  // ── Create portal ─────────────────────────────────────
  document.getElementById('createClientBtn').addEventListener('click', async () => {
    const name    = document.getElementById('clientName').value.trim();
    const partner = document.getElementById('clientPartner').value.trim();
    const date    = document.getElementById('clientDate').value.trim();
    const slug    = document.getElementById('clientSlug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
    const cover   = document.getElementById('clientCover').value.trim();

    if (!name) { toast('Please enter the bride\'s name.'); return; }
    if (!slug) { toast('Please enter a URL slug.'); return; }

    try {
      const { error } = await sb.from('clients').insert([{
        name, partner, date, slug, cover_photo: cover || '', videos: []
      }]);
      if (error) throw error;

      ['clientName','clientPartner','clientDate','clientSlug','clientCover'].forEach(id => {
        document.getElementById(id).value = '';
      });
      toast(`Portal created for ${name} ✓`);
      await renderClients();
    } catch (err) {
      if (err.code === '23505' || err.message?.includes('duplicate') || err.message?.includes('unique')) {
        toast('That slug is already taken — please choose another.');
      } else {
        toast('Error creating portal: ' + err.message);
      }
    }
  });

  // ── Render client list ────────────────────────────────
  async function renderClients() {
    const list  = document.getElementById('clientList');
    const count = document.getElementById('listCount');

    list.innerHTML = '<div class="empty-portals"><p style="color:var(--text-soft);font-size:0.85rem;">Loading portals…</p></div>';

    const clients = await getClients();

    count.textContent = clients.length ? `${clients.length} portal${clients.length !== 1 ? 's' : ''}` : '';

    if (!clients.length) {
      list.innerHTML = `<div class="empty-portals"><p>No portals yet — create one above</p></div>`;
      return;
    }

    list.innerHTML = '';
    clients.forEach(client => {
      const displayName = client.partner
        ? `${client.name} & ${client.partner}` : client.name;
      const videos     = client.videos || [];
      const videoCount = videos.length;
      const portalURL  = `${location.origin}${location.pathname.replace('admin.html', '')}client.html?bride=${client.slug}`;

      const card = document.createElement('div');
      card.className = 'client-card';
      card.dataset.slug = client.slug;

      card.innerHTML = `
        <div class="client-row">
          <div class="client-info">
            <h3>${displayName} <span class="vid-badge">${videoCount} video${videoCount !== 1 ? 's' : ''}</span></h3>
            <p>${client.date || 'No date set'} &nbsp;&middot;&nbsp; /${client.slug}</p>
          </div>
          <div class="client-actions">
            <button class="btn btn-add" data-slug="${client.slug}">
              <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
              Add Videos
            </button>
            <a class="btn btn-outline" href="client.html?bride=${client.slug}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Preview
            </a>
            <button class="btn btn-copy" data-url="${portalURL}">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="1"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy Link
            </button>
            <button class="btn btn-del" data-slug="${client.slug}" title="Delete portal">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>

        <!-- VIDEO PANEL -->
        <div class="video-panel" id="vp-${client.slug}">
          <p class="panel-title">Videos for ${displayName}</p>

          <!-- DIRECT UPLOAD -->
          <div class="upload-section">
            <p class="upload-section-title">Upload directly from your computer</p>
            <label class="upload-label-btn" id="uplabel-${client.slug}">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Choose MP4 file
              <input type="file" id="upfile-${client.slug}" accept="video/mp4,video/mov,video/quicktime,video/*" style="display:none" data-slug="${client.slug}" />
            </label>
            <div class="upload-progress" id="upprog-${client.slug}">
              <div class="upload-track"><div class="upload-fill" id="upfill-${client.slug}"></div></div>
              <span class="upload-status-text" id="upstat-${client.slug}"></span>
            </div>
          </div>

          <div class="panel-or">
            <div class="panel-or-line"></div>
            <span class="panel-or-text">or paste a link</span>
            <div class="panel-or-line"></div>
          </div>

          <div class="url-tip">
            <strong>Dropbox:</strong> Right-click your MP4 → Share → Copy Link → paste below. Auto-converted for direct playback.<br>
            <strong>Google Drive:</strong> Right-click your MP4 → Share → Copy Link → paste below. Auto-converted for direct playback.
          </div>

          <div class="add-row">
            <div class="form-group">
              <label class="form-label">Video Title</label>
              <input class="form-input" type="text" id="vt-${client.slug}" placeholder="e.g. Ceremony Highlights" />
            </div>
            <div class="form-group">
              <label class="form-label">Video URL (MP4 or Dropbox link)</label>
              <input class="form-input" type="url" id="vu-${client.slug}" placeholder="https://www.dropbox.com/s/..." />
            </div>
            <button class="add-btn" data-slug="${client.slug}">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add
            </button>
          </div>

          <div class="vid-list" id="vl-${client.slug}"></div>
        </div>
      `;

      list.appendChild(card);
      renderVideoList(client.slug, videos);

      // ── Toggle panel ─────────────────────────────
      card.querySelector('.btn-add').addEventListener('click', function() {
        const panel = document.getElementById(`vp-${client.slug}`);
        const open  = panel.classList.toggle('open');
        card.classList.toggle('panel-open', open);
        this.classList.toggle('active', open);
        if (open) document.getElementById(`vt-${client.slug}`).focus();
      });

      // ── Add video via URL ──────────────────────────
      card.querySelector('.add-btn[data-slug]').addEventListener('click', async function() {
        const slug  = this.dataset.slug;
        const title = document.getElementById(`vt-${slug}`).value.trim();
        const url   = document.getElementById(`vu-${slug}`).value.trim();
        if (!url) { toast('Please enter a video URL.'); return; }
        try {
          const { data: row, error } = await sb.from('clients').select('videos').eq('slug', slug).single();
          if (error) throw error;
          const vids = row.videos || [];
          vids.push({ title: title || `Film ${vids.length + 1}`, src: url, type: 'video/mp4' });
          await updateVideos(slug, vids);
          document.getElementById(`vt-${slug}`).value = '';
          document.getElementById(`vu-${slug}`).value = '';
          renderVideoList(slug, vids);
          refreshBadge(slug, vids.length);
          toast('Video added ✓');
        } catch (err) { toast('Error adding video: ' + err.message); }
      });

      // ── Enter on URL field ─────────────────────────
      card.querySelector(`#vu-${client.slug}`).addEventListener('keydown', function(e) {
        if (e.key === 'Enter') card.querySelector(`.add-btn[data-slug="${client.slug}"]`).click();
      });

      // ── Direct upload to Supabase ──────────────────
      card.querySelector(`#upfile-${client.slug}`).addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;

        const slug     = this.dataset.slug;
        const titleVal = (document.getElementById(`vt-${slug}`)?.value || '').trim();
        const title    = titleVal || file.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');
        const label    = document.getElementById(`uplabel-${slug}`);
        const progWrap = document.getElementById(`upprog-${slug}`);
        const fill     = document.getElementById(`upfill-${slug}`);
        const stat     = document.getElementById(`upstat-${slug}`);

        label.style.background = 'var(--gold)';
        label.style.pointerEvents = 'none';
        progWrap.style.display = 'block';
        fill.style.width = '30%';
        fill.className = 'upload-fill';
        stat.textContent = 'Uploading — please wait…';

        try {
          const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
          const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, file, { cacheControl: '3600', upsert: false });
          if (error) throw error;
          fill.style.width = '80%';
          const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(data.path);
          const publicUrl = urlData.publicUrl;

          const { data: row, error: fetchErr } = await sb.from('clients').select('videos').eq('slug', slug).single();
          if (fetchErr) throw fetchErr;
          const vids = row.videos || [];
          vids.push({ title, src: publicUrl, type: 'video/mp4' });
          await updateVideos(slug, vids);

          fill.style.width = '100%';
          fill.classList.add('complete');
          stat.textContent = '✓ Upload complete!';
          label.style.background = '';
          label.style.pointerEvents = '';
          setTimeout(() => { progWrap.style.display = 'none'; }, 3000);
          if (document.getElementById(`vt-${slug}`)) document.getElementById(`vt-${slug}`).value = '';
          this.value = '';
          renderVideoList(slug, vids);
          refreshBadge(slug, vids.length);
          toast(`"${title}" uploaded ✓`);
        } catch (err) {
          fill.classList.add('error');
          fill.style.width = '100%';
          stat.textContent = `Upload failed — ${err.message}`;
          label.style.background = '';
          label.style.pointerEvents = '';
          console.error('Upload error:', err);
        }
      });

      // ── Copy link ──────────────────────────────────
      card.querySelector('.btn-copy').addEventListener('click', function() {
        navigator.clipboard.writeText(this.dataset.url).then(() => {
          this.classList.add('copied');
          this.innerHTML = `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
          setTimeout(() => {
            this.classList.remove('copied');
            this.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="1"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Link`;
          }, 2500);
        }).catch(() => toast('Copy failed — please copy the link manually.'));
      });

      // ── Delete portal ──────────────────────────────
      card.querySelector('.btn-del').addEventListener('click', async function() {
        const slug = this.dataset.slug;
        if (!confirm(`Delete ${client.name}'s portal? This cannot be undone.`)) return;
        try {
          await deleteClientDB(slug);
          await renderClients();
          toast('Portal deleted');
        } catch (err) { toast('Error deleting: ' + err.message); }
      });
    });
  }

  // ── Render video list ─────────────────────────────────
  function renderVideoList(slug, videos) {
    const el = document.getElementById(`vl-${slug}`);
    if (!el) return;
    if (!videos || !videos.length) {
      el.innerHTML = `<p class="vid-empty">No videos yet — add one above.</p>`;
      return;
    }
    el.innerHTML = '';
    videos.forEach((v, i) => {
      const item = document.createElement('div');
      item.className = 'vid-item';
      item.innerHTML = `
        <span class="vid-num">${i + 1}</span>
        <div class="vid-info">
          <div class="vid-title">${v.title || 'Untitled'}</div>
          <div class="vid-url">${v.src}</div>
        </div>
        <button class="vid-remove" data-idx="${i}" title="Remove">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      item.querySelector('.vid-remove').addEventListener('click', async () => {
        try {
          const { data: row, error } = await sb.from('clients').select('videos').eq('slug', slug).single();
          if (error) throw error;
          const updated = (row.videos || []).filter((_, idx) => idx !== i);
          await updateVideos(slug, updated);
          renderVideoList(slug, updated);
          refreshBadge(slug, updated.length);
          toast('Video removed');
        } catch (err) { toast('Error removing video: ' + err.message); }
      });
      el.appendChild(item);
    });
  }

  // ── Update badge ──────────────────────────────────────
  function refreshBadge(slug, count) {
    const card = document.querySelector(`.client-card[data-slug="${slug}"]`);
    if (!card) return;
    const badge = card.querySelector('.vid-badge');
    if (badge) badge.textContent = `${count} video${count !== 1 ? 's' : ''}`;
  }

  // ── Toast ─────────────────────────────────────────────
  let toastTmr;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => el.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
